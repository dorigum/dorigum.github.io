<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>찜 리스트</title>
    <link rel="stylesheet" type="text/css" href="css/basic.css" />
    <style type="text/css">
      .poster {
        width: 100px;
        height: 120px;
        object-fit: cover;
      }
      a {
        text-decoration: none;
        margin: 0 10px;
        color: blue;
      }
      table {
        border-collapse: collapse;
        margin-top: 20px;
      }
      th, td {
        border: 1px solid #ddd;
        padding: 10px;
        text-align: center;
      }
      .total-price {
        text-align: right;
        font-size: 20px;
        font-weight: bold;
        margin: 20px;
        color: red;
      }
    </style>
  </head>
  <body>
    <article class="main">
      <section>
        <table width="80%" align="center">
          <caption class="caption">
            <h3>찜 리스트</h3>
          </caption>
          <thead>
            <tr>
              <th>이미지</th>
              <th>상품번호</th>
              <th>상품이름</th>
              <th>가격</th>
              <th>삭제</th>
            </tr>
          </thead>
          <tbody id="content">
            </tbody>
        </table>
      </section>

      <section class="totalprice" id="price" style="text-align: center; margin: 20px;">
      </section>

      <section class="link">
        <table align="center" style="border: none;">
          <tr>
            <td align="center" style="border: none;">
              <a href="#">주문하러 가기</a>
              <a href="index.html">DVD LIST</a>
              <button id="clearAll" style="margin-left: 20px;">전체 삭제</button>
            </td>
          </tr>
        </table>
      </section>
    </article>

    <script>
      // 페이지 로드 시 리스트 불러오기
      window.addEventListener("load", () => {
        getInfo();
      });

      const getInfo = function () {
        const tbody = document.getElementById("content");
        const priceSection = document.getElementById("price");
        let len = localStorage.length;
        let str = "";
        let totalPrice = 0;

        if (len === 0) {
          tbody.innerHTML = "<tr><td colspan='5'>찜한 상품이 없습니다.</td></tr>";
          priceSection.innerHTML = "총 결제 금액: 0원";
          return;
        }

        // 로컬 스토리지를 돌며 tr 추가
        for (let i = 0; i < len; i++) {
          let key = localStorage.key(i);
          let value = localStorage.getItem(key);
          
          // 영화명, 이미지경로, 가격 데이터를 'split' 로 분리
          let data = value.split(",");
          let movieName = data[0];
          let moviePoster = data[1];
          let moviePrice = parseInt(data[2]); // 숫자로 변환

          totalPrice += moviePrice; // 총액 누적

          // ★toLocaleString() : 숫자 3자리마다 ',' 추가 => 1,000원
          str += `
            <tr>
              <td><img src="${moviePoster}" class="poster"></td>
              <td>${key}</td>
              <td>${movieName}</td>
              <td>${moviePrice.toLocaleString()}원</td>
              <td><button class="delBtn" data-key="${key}">삭제</button></td>
            </tr>
          `;
        }

        tbody.innerHTML = str;
        priceSection.innerHTML = `<h3>총 주문 가격: ${totalPrice.toLocaleString()}원</h3>`;
      };

      // 삭제 이벤트(이벤트 위임)★★★
      document.getElementById("content").addEventListener("click", (e) => {
        if (e.target.classList.contains("delBtn")) {
          const key = e.target.dataset.key;
          if (confirm("정말 삭제하시겠습니까?")) {
            localStorage.removeItem(key); // 로컬 스토리지에서 삭제
            getInfo(); // 화면 갱신
          }
        }
      });

      // 전체 삭제 버튼 기능
      document.getElementById("clearAll")?.addEventListener("click", () => {
        if (confirm("찜 리스트를 모두 비우시겠습니까?")) {
          localStorage.clear();
          getInfo();
        }
      });
    </script>
  </body>
</html>
